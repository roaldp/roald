# Runtime configuration template (safe to commit)

# Pulse intervals (defaults)
full_pulse_interval_minutes: 30
slack_poll_interval_seconds: 1

# User identity (fill locally in config.yaml; do not commit secrets or IDs)
slack_user_id: ""   # Required. Your Slack user ID, e.g. U01XXXXXXX
slack_channel_id: ""  # Optional. Channel to post/listen in. Defaults to slack_user_id (self-DM). Set to a channel/group ID to use a different channel.

# Timezone
timezone: "UTC"

# Source toggles
sources:
  slack: true
  gmail: true
  fireflies: true
  calendar: true
  google_drive: true

# Google Drive transcript folder (auto-discovered; set manually to skip discovery)
google_drive_transcript_folder_id: ""

# Claude CLI config
claude_command: "claude"
claude_model: "sonnet"
claude_timeout_seconds: 300
